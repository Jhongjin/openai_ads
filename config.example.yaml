chunking:
  chunk_size_tokens: 700
  chunk_overlap_tokens: 100

retrieval:
  top_k_per_collection: 4
  min_relevance_score: 0.32

database:
  provider: "supabase"
  schema: "openai_ads_rag"
  embedding_dimensions: 1536
  embedding_batch_size: 96

crawler:
  respect_robots_txt: true
  user_agent: "nasmedia-chatgpt-ads-rag/0.1 (+internal-poc)"
  request_timeout_seconds: 30

collections:
  official:
    tier_label: "OpenAI 공식 문서"
    help_center_collections:
      ko: "https://help.openai.com/ko-kr/collections/20001223-chatgpt-ads"
      en: "https://help.openai.com/en/collections/20001223-chatgpt-ads"
    urls:
      - "https://developers.openai.com/api/docs/bots"
      - "https://openai.com/policies/ad-policies"
      - "https://openai.com/index/testing-ads-in-chatgpt"
    documents:
      - title: "Ads in ChatGPT: The Basics"
        source_url: "https://help.openai.com/en/articles/20001207"
        content: |
          한국어 요약: ChatGPT 광고는 관련 대화 아래 영역에 노출된다. 광고 구성요소는 광고주명, 파비콘/로고, 제목, 설명문, 랜딩 페이지, 이미지 소재다.
          Ads in ChatGPT help advertisers reach users in relevant conversational contexts. Ads appear below relevant ChatGPT conversations.
          The ad format includes advertiser name, favicon or advertiser logo, title/headline, copy/description, landing page, and image asset/creative.
          Ads Manager Beta reporting includes impressions, clicks, spend, CTR, average CPC, average CPM, and conversions.
          Pricing supports CPM and CPC buying options. OpenAI recommends a starting max CPC bid of $3-5 USD per click, and the default max bid for CPM campaigns is $60 CPM. These are bid guidance values, not a guaranteed exact media unit price.
      - title: "Launch Campaigns"
        source_url: "https://help.openai.com/en/articles/20001209"
        content: |
          한국어 요약: 광고 문구 글자 수 제한은 제목 16~24자 권장, 최대 50자이며, 설명문은 32~48자 권장, 최대 100자다. 이미지 URL은 공개 접근 가능한 직접 PNG/JPG 링크이고 정사각형, 최대 1200x1200 조건을 따른다.
          Campaign launch requires an Ads Manager Beta account, advertiser account setup with name and favicon, billing profile/payment method, and prepared campaign/ad group/ad inputs.
          Campaigns define objective, budget, and country targeting. Ad groups organize themes, intents, and context hints. Ads are the creative units shown to users.
          For ads, required fields include ad group name, ad title, ad copy, landing page URL, and image URL.
          Ad title guidance is 16-24 characters recommended and 50 characters maximum. Ad copy guidance is 32-48 characters recommended and 100 characters maximum.
          Landing page URLs must be valid, reachable, and not blocked by OpenAI crawlers. Image URLs must be publicly accessible direct PNG or JPG files, square, and no larger than 1200 x 1200.
      - title: "Create Ads for ChatGPT"
        source_url: "https://help.openai.com/en/articles/20001212"
        content: |
          한국어 요약: 랜딩 URL은 가장 관련성 높은 목적지여야 하며, 유효하고 접근 가능해야 하고, OpenAI 사용자 에이전트 OAI-AdsBot 및 OAI-SearchBot을 차단하면 안 된다. UTM 등 추적 파라미터를 목적지 URL에 직접 붙일 수 있다.
          ChatGPT ad titles and copy should be clear, specific, useful, and accurate. Ads should align with conversational user intent rather than keyword-only matching.
          Landing pages should link to the most relevant destination, create a seamless path to action, and may include UTM tracking parameters directly in the destination URL.
          Landing pages must use valid links and must not block OpenAI user agents OAI-AdsBot and OAI-SearchBot.
          Images should be simple, relevant, uncluttered, and aligned with the ad message.
      - title: "ChatGPT Ads 공식 가이드 모음"
        source_url: "https://help.openai.com/ko-kr/collections/20001223-chatgpt-ads"
        content: |
          OpenAI 한국어 Help Center의 ChatGPT Ads 공식 가이드 모음이다. 베타 단계의 정책, 소재 요건, 계정 설정, 캠페인 생성, 측정, 문제 해결 등 최신 공식 안내는 이 컬렉션과 연결된 개별 문서를 우선 확인한다.
          This Korean OpenAI Help Center collection is the official ChatGPT Ads guide hub. Reconfirm beta-stage policy, creative requirements, account setup, campaign creation, measurement, troubleshooting, and related official guidance from this collection and its linked articles.
      - title: "Overview of OpenAI Crawlers"
        source_url: "https://developers.openai.com/api/docs/bots"
        content: |
          한국어 요약: OAI-AdsBot은 ChatGPT 광고로 제출된 랜딩 페이지의 안전성과 정책 준수 여부를 확인하는 광고 로봇이다. OAI-SearchBot은 ChatGPT 검색 결과 노출을 위한 검색 로봇이다.
          OAI-AdsBot is used to validate the safety of web pages submitted as ads on ChatGPT. When an ad is submitted, OpenAI may visit the landing page to ensure it complies with policies.
          OpenAI may also use landing page content to determine when the ad is most relevant to show to users. OAI-AdsBot only visits pages submitted as ads, and data collected by OAI-AdsBot is not used to train generative AI foundation models.
          OAI-SearchBot is used to surface websites in search results in ChatGPT search features. To help ensure a site appears in search results, OpenAI recommends allowing OAI-SearchBot in robots.txt and allowing requests from published IP ranges.
          429 Too Many Requests는 요청이 너무 많거나 속도 제한(rate limit)에 걸렸다는 의미다. 대량 업로드나 반복 검수 중 429가 발생하면 작은 배치로 나누어 분산 제출하고 시간을 두고 재시도한다.
      - title: "OpenAI Ad Policies"
        source_url: "https://openai.com/policies/ad-policies/"
        content: |
          OpenAI ads, landing pages, creatives, and claims must comply with OpenAI ad policies. Ads can be rejected if they are misleading, inconsistent with the landing page, unsafe, or include disallowed content.
          Policy and brand-safety constraints can affect whether an ad is accepted or shown.
      - title: "Testing ads in ChatGPT"
        source_url: "https://openai.com/index/testing-ads-in-chatgpt/"
        content: |
          OpenAI announced testing ads in ChatGPT as a beta experience. Because the product is in beta, policy, eligibility, and operational details may change and should be reconfirmed on official pages or with OpenAI contacts.
  kr_ops:
    tier_label: "나스미디어 내부 자료"
    paths:
      - "data/kr_ops"
    documents:
      - title: "국내 운영 메모"
        source_url: "internal://kr_ops/operating-notes"
        updated_at: "2026-06-17"
        content: |
          나스미디어 영업 운영 메모: 광고주에게 안내할 때 공식 문서와 국내 운영 가이드가 충돌하면 공식 최대값과 국내 권장값을 함께 제시한다.
          크리테오 원문은 인덱싱하지 않는다. 확정된 크리테오 경유 값은 내부운영 출처로 답하되, 운영 중 개별 이슈는 크리테오 코리아 담당자 확인이 필요하다.
          베타 단계이므로 수치, 정책, 인벤토리, 검수 기준은 변동 가능성이 있다. 제안서 반영 전 OpenAI 공식 페이지와 담당자 확인을 우선한다.
          광고주 준비물은 랜딩 URL, 파비콘 또는 로고 직접 이미지 URL, 제목/본문 문구, 이미지 소재 URL, 추적 파라미터 필요 여부이다.
      - title: "OpenAI/크리테오 확정 회신(2026-06-17)"
        source_url: "internal://kr_ops/openai-criteo-confirmed-2026-06"
        updated_at: "2026-06-17"
        content: |
          한국 최소 집행금액: OpenAI CBT는 400만원 Net 기준이며 기간 제한 없이 광고비 소진 시까지 운영한다. 크리테오 경유는 1,000만원 Net 기준이며 월 단위 구좌제, 1개월 무제한 노출 조건이다. 광고주 전달용 슬라이드에는 "최소 집행 약정 400만원 / 상세 조건은 영업 담당 안내" 톤으로 표기하고 크리테오 1,000만원은 내부 영업 안내로 처리한다.
          입찰/과금: OpenAI CBT는 CPC와 CPM 선택 가능하며 최대 입찰가(CPM·CPC) 조정 가능하다. 크리테오 경유는 CPM만 가능하며 입찰 조정은 불가하다. 입찰 단위는 KRW다. 캠페인 레벨은 예산(총액/일), 광고그룹 레벨은 CPM/CPC 최대 입찰가를 설정한다. 최대 입찰가를 높이면 노출 개선에 도움될 수 있으나 relevance-weighted, second-price auction 구조상 노출량 증가나 보장은 아니다.
          수수료/마크업: OpenAI CBT와 크리테오 경유 모두 마크업 진행이 필요하다. 크리테오는 호스팅사(카페24, 메이크샵 등) 연동 운영 시 호스팅 fee 5%가 발생한다.
          VAT: 한국 사업자등록번호(BRN) 또는 세금ID 제공 시 0%, 미제공 시 10%로 적용된다.
          전환 추적(트래커): 노출/클릭 캠페인에서는 필수는 아니지만 강력 권장한다. 향후 전환 최적화 캠페인은 전환 추적 설정이 필요하다.
          Account Spend Cap: 계정 단위 lifetime spend cap이며 OpenAI 팀이 설정한다. 대행사나 광고주가 직접 설정할 수 없고 월 단위 cap도 아니다. 런칭 시 전 계정 한도를 상향 예정이며 이후 캠페인 단위 예산 제어(campaign-level budget control) 도입 예정이다. 상세는 추후 OpenAI 공지 대상이다. 최소 집행 약정과는 별개 개념이므로 혼동하지 않는다. 이 값은 변동 가능성이 있다.
          예산 최소값: 일 최소 KRW 25,000 / 총예산 최소 KRW 1,000은 Ads Manager 시스템 표기값이지만 OpenAI도 의도된 정책값인지 확정하지 못했다. 실무상 캠페인 예산은 이보다 훨씬 높게 설정하는 것을 권장한다. 표기값과 정책 확정 여부는 변동 가능성이 있다.
          추가 광고주 신청 절차: 기존 27개사 외 추가 광고주는 tracker에 기입한 뒤 이메일로 통보하면 OpenAI가 추가 Ads Manager 계정을 provisioning한다.
          인보이스(OpenAI): 나스미디어가 대행 광고 계정 전체를 통합해 단일 인보이스를 발행하고, 인보이스 내 광고주별 집행금액을 개별 표기한다. 실제 집행분 기준 익월 첫 영업일 7일 이내 발행된다.
          인보이스(크리테오): 기존 크리테오 광고 상품 정산과 동일 방식 예정이다. 단, 추후 변경될 수 있다. 미집행 계정 페널티는 없고 실제 집행분만 청구한다.
          랜딩 페이지: 자사몰과 외부몰(네이버 브랜드스토어·스마트스토어, 쿠팡, 올리브영 등) 제품 페이지 모두 허용한다. 단, OpenAI 크롤러 접근이 가능해야 한다. 트래커 advertiser URL은 정책 심사용으로 공식 홈페이지를 권장한다.
          제한/불가 업종: 금융·건강/의료는 불가 업종이나 협의 후 진행 가능한 케이스가 있어 매체 측 재확인을 권장한다. 금융 허용 세부는 예금/계좌, 신용카드, 보험, 자동차 대출/리스, 주택담보 대출, 투자/증권/로보어드바이저다. 건강/의료 허용 세부는 일반의약품(OTC), 건강기능식품/영양제다.
          OpenAI 직접 vs 크리테오 경유 차이: OpenAI 직접은 광고계정에 접근해 셀프서브로 세팅·운영한다. 글로벌 소통 구조라 이슈 발생 시 커뮤니케이션 시간이 오래 걸릴 수 있다. 크리테오 경유는 캠페인 브리프와 소재를 전달하면 크리테오가 직접 세팅해 안정적으로 운영할 수 있다.
          문제 처리 경로: OpenAI 직접은 ChatGPT Ads 헬프센터를 참고하거나 ads-support@openai.com으로 문의한다. 단, 글로벌 소통 구조라 시간이 소요될 수 있다. 크리테오 경유는 크리테오 코리아 담당자 측과 확인 처리한다.
          10% 롤아웃/인벤토리: CBT·런칭 초기 한국 유저(Free&Go) 10%에게 노출 후 점진 확대한다. 크리테오 경유도 동일 적용하며 예외는 없다. OpenAI 직접과 크리테오 경유 모두 동일 인벤토리·유저 풀을 공유하고 경로 간 별도 분리나 할당은 아니다.
          일정: 한국 런칭은 2026년 6월 18일 확정이다. 시차로 계정별 실제 적용 시점은 상이할 수 있다. 정식 오픈은 7월 중순 예정(셀프서브)이며, 크리테오는 2026년 6월 18일 정식 런칭으로 CBT 개념은 아니다.
          벤치마크: 글로벌·한국 모두 초기 단계로 현재 공개 사례나 표준 벤치마크는 없다. 업데이트 시 추가 안내 예정이다.
          인벤토리 공유: OpenAI 직접과 크리테오 경유 모두 동일 인벤토리·유저 풀을 공유한다. 경로 간 별도 분리나 할당은 아니다.
          한글 소재 최대 자수: OpenAI 직접은 제목 50자 max, 16~24자 권장이고 설명 100자 max, 32~48자 권장이다. 크리테오 경유는 제목 30자, 설명 60자이며 국문 띄어쓰기를 포함한다. 경로 미지정 질문에는 두 경로를 모두 안내한다.
          크리테오 경유 확정 값인 1,000만원 Net, 월 단위 구좌제, 1개월 무제한 노출, CPM만 가능, 입찰 조정 불가, 기존 크리테오 광고 상품 정산과 동일 방식 예정은 직접 답한다. 운영 중 개별 이슈는 크리테오 코리아 담당자 확인이 필요하다.
  pending:
    tier_label: "확인 대기 (미확정)"
    paths:
      - "data/pending"
    documents:
      - title: "크롤러 에러코드 확인 대기"
        source_url: "internal://pending/crawler-error-codes"
        updated_at: "2026-06-17"
        content: |
          크롤러 에러코드 전체 목록은 OpenAI 확인 대기 중이다. 429 Too Many Requests는 OpenAI 크롤러 공식 문서 기준 rate limit 의미로 안내할 수 있으나, 429 외 전체 에러코드 목록을 임의로 나열하지 않는다.

ignored_local_patterns:
  - "*criteo*"
  - "*Criteo*"
  - "*CRITEO*"
  - "*크리테오*"

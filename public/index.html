<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChatGPT 광고 Q&A</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --ink: #15171a;
        --muted: #667085;
        --line: #d9dee7;
        --accent: #0f6bff;
        --accent-dark: #0953c5;
        --pending: #9a6700;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      main {
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-height: 100vh;
      }

      header {
        border-bottom: 1px solid var(--line);
        background: var(--panel);
        padding: 18px 24px;
      }

      h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
      }

      .shell {
        width: min(980px, 100%);
        margin: 0 auto;
      }

      .messages {
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: 24px;
      }

      .message {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 16px;
      }

      .message.user {
        border-color: #b8c7e6;
      }

      .role {
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .content {
        margin: 0;
        white-space: pre-wrap;
        line-height: 1.6;
        font-size: 15px;
      }

      details {
        margin-top: 14px;
      }

      summary {
        cursor: pointer;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .source {
        margin-top: 10px;
        border-top: 1px solid var(--line);
        padding-top: 10px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
        overflow-wrap: anywhere;
      }

      form {
        border-top: 1px solid var(--line);
        background: var(--panel);
        padding: 16px 24px 22px;
      }

      .input-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }

      textarea {
        min-height: 52px;
        max-height: 180px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 13px 14px;
        font: inherit;
        line-height: 1.4;
      }

      button {
        min-width: 86px;
        border: 0;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-dark);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      .empty {
        color: var(--muted);
      }

      @media (max-width: 640px) {
        header,
        .messages,
        form {
          padding-left: 14px;
          padding-right: 14px;
        }

        .input-row {
          grid-template-columns: 1fr;
        }

        button {
          height: 46px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div class="shell">
          <h1>ChatGPT 광고 Q&A</h1>
        </div>
      </header>

      <section class="shell messages" id="messages">
        <div class="message">
          <div class="role">assistant</div>
          <p class="content empty">질문을 입력하면 근거와 신뢰등급을 함께 확인합니다.</p>
        </div>
      </section>

      <form id="chat-form">
        <div class="shell input-row">
          <textarea
            id="question"
            name="question"
            placeholder="예: ChatGPT 광고 최소 집행금액 얼마야?"
            required
          ></textarea>
          <button id="send" type="submit">전송</button>
        </div>
      </form>
    </main>

    <script>
      const form = document.querySelector("#chat-form");
      const question = document.querySelector("#question");
      const messages = document.querySelector("#messages");
      const send = document.querySelector("#send");
      const tierLabels = {
        official: "✅공식",
        kr_ops: "🟡국내운영",
        pending: "⚠️확인대기",
      };

      function addMessage(role, content, sources = []) {
        const card = document.createElement("article");
        card.className = `message ${role}`;

        const roleEl = document.createElement("div");
        roleEl.className = "role";
        roleEl.textContent = role;

        const contentEl = document.createElement("p");
        contentEl.className = "content";
        contentEl.textContent = content;

        card.append(roleEl, contentEl);

        if (sources.length > 0) {
          const details = document.createElement("details");
          const summary = document.createElement("summary");
          summary.textContent = "근거";
          details.append(summary);
          sources.slice(0, 8).forEach((source) => {
            const item = document.createElement("div");
            item.className = "source";
            const tier = tierLabels[source.source_tier] || source.source_tier || "";
            item.textContent = `${tier} ${source.title || ""} · ${source.source_url || ""} · score ${
              source.score ?? ""
            }`;
            details.append(item);
          });
          card.append(details);
        }

        messages.append(card);
        card.scrollIntoView({ behavior: "smooth", block: "end" });
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const text = question.value.trim();
        if (!text) return;

        addMessage("user", text);
        question.value = "";
        send.disabled = true;

        try {
          const response = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question: text }),
          });
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.detail || response.statusText);
          }
          addMessage("assistant", payload.answer, payload.sources || []);
        } catch (error) {
          addMessage("assistant", `오류가 발생했습니다: ${error.message}`);
        } finally {
          send.disabled = false;
          question.focus();
        }
      });
    </script>
  </body>
</html>

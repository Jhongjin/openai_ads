name: Reindex OpenAI Help Center

on:
  workflow_dispatch:
  schedule:
    # KST 09:00 and 21:00
    - cron: "0 0,12 * * *"

jobs:
  reindex:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_EMBEDDING_MODEL: ${{ secrets.OPENAI_EMBEDDING_MODEL || 'text-embedding-3-small' }}
      OPENAI_EMBEDDING_DIMENSIONS: ${{ secrets.OPENAI_EMBEDDING_DIMENSIONS || '1536' }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_SCHEMA: ${{ secrets.SUPABASE_SCHEMA || 'openai_ads_rag' }}
      RAG_CONFIG_PATH: config.example.yaml
      EMBEDDING_BATCH_SIZE: ${{ secrets.EMBEDDING_BATCH_SIZE || '96' }}
      ENABLE_READER_FALLBACK: "true"
      READER_FALLBACK_DELAY_SECONDS: "1.2"
      REQUIRE_HELP_CENTER_MIN_ARTICLES: "30"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install "curl-cffi>=0.7.4"

      - name: Reindex official Help Center documents
        run: python ingest.py --collection official

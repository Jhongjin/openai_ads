name: Collect OpenAI Manager Mail

on:
  workflow_dispatch:
  schedule:
    # KST 09:15 and 21:15, shortly after the official Help Center crawl.
    - cron: "15 0,12 * * *"

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_EMBEDDING_MODEL: ${{ secrets.OPENAI_EMBEDDING_MODEL || 'text-embedding-3-small' }}
      OPENAI_EMBEDDING_DIMENSIONS: ${{ secrets.OPENAI_EMBEDDING_DIMENSIONS || '1536' }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_SCHEMA: ${{ secrets.SUPABASE_SCHEMA || 'openai_ads_rag' }}
      RAG_CONFIG_PATH: config.example.yaml
      EMBEDDING_BATCH_SIZE: ${{ secrets.EMBEDDING_BATCH_SIZE || '96' }}
      MAIL_COLLECTOR_PROVIDER: daum
      MAIL_COLLECTOR_PROTOCOL: imap
      MAIL_COLLECTOR_HOST: ${{ secrets.MAIL_COLLECTOR_HOST || 'imap.daum.net' }}
      MAIL_COLLECTOR_PORT: ${{ secrets.MAIL_COLLECTOR_PORT || '993' }}
      MAIL_COLLECTOR_SECURE: ${{ secrets.MAIL_COLLECTOR_SECURE || 'true' }}
      MAIL_COLLECTOR_USER: ${{ secrets.MAIL_COLLECTOR_USER }}
      MAIL_COLLECTOR_PASSWORD: ${{ secrets.MAIL_COLLECTOR_PASSWORD }}
      MAIL_COLLECTOR_FOLDER: ${{ secrets.MAIL_COLLECTOR_FOLDER || 'INBOX' }}
      MAIL_COLLECTOR_TOP: ${{ secrets.MAIL_COLLECTOR_TOP || '50' }}
      MAIL_COLLECTOR_TARGET_RECIPIENTS: openai@nasmedia.co.kr
      MAIL_COLLECTOR_TARGET_SENDERS: michaelcho@openai.com,harrisonk@openai.com,ads-korea@openai.com,nigel@openai.com
      MAIL_COLLECTOR_SHEETS_WEBHOOK_URL: ${{ secrets.MAIL_COLLECTOR_SHEETS_WEBHOOK_URL }}
      MAIL_COLLECTOR_SHEETS_SHARED_SECRET: ${{ secrets.MAIL_COLLECTOR_SHEETS_SHARED_SECRET || secrets.SHEETS_SHARED_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Collect matching OpenAI manager mail
        run: python -m rag_chatbot.mail_collector --write-rag-doc data/kr_ops/openai_email_confirmations.md --post-sheet

      - name: Reindex kr_ops with collected mail document
        run: python ingest.py --collection kr_ops
